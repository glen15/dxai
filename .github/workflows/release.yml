name: Release

on:
  push:
    tags:
      - 'V*'

permissions:
  contents: write
  pages: write

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: release-amd64
            artifact_name: binaries-amd64
          - os: macos-latest
            target: release-arm64
            artifact_name: binaries-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        with:
          go-version: "1.24.6"

      - name: Build Binaries
        run: |
          make ${{ matrix.target }}
          ls -l bin/

      - name: Package binaries for Homebrew
        run: |
          cd bin
          # Package binaries into tar.gz for Homebrew resource
          if [[ "${{ matrix.target }}" == "release-arm64" ]]; then
            tar -czf binaries-darwin-arm64.tar.gz analyze-darwin-arm64 status-darwin-arm64
            ls -lh binaries-darwin-arm64.tar.gz
          else
            tar -czf binaries-darwin-amd64.tar.gz analyze-darwin-amd64 status-darwin-amd64
            ls -lh binaries-darwin-amd64.tar.gz
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/*-darwin-*
          retention-days: 1

  build-app:
    name: Build DxaiBar.app
    needs: [build]
    runs-on: macos-15
    outputs:
      ed_signature: ${{ steps.sparkle_sign.outputs.ed_signature }}
      zip_length: ${{ steps.sparkle_sign.outputs.length }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Download Go binaries (arm64)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: binaries-arm64
          path: go-bins

      - name: Place Go binaries for CLI bundle
        run: |
          cp go-bins/analyze-darwin-arm64 bin/analyze-go
          cp go-bins/status-darwin-arm64 bin/status-go
          chmod +x bin/analyze-go bin/status-go

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#V}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to search list (prepend so it's found first)
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychain -d user | tr -d '"')

          # Verify identity is available
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "Certificate installed successfully"

      - name: Setup notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "dxai-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD"
          echo "Notarization credentials stored"

      - name: Build DxaiBar.app bundle
        run: |
          cd app/DxaiBar
          DXAI_VERSION=${{ steps.version.outputs.version }} ./scripts/build-app.sh release

      - name: Sign zip with Sparkle EdDSA
        id: sparkle_sign
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          brew install sparkle
          xattr -cr "$(brew --prefix)/Caskroom/sparkle/*/bin/"* 2>/dev/null || true
          SIGN_UPDATE="$(find "$(brew --prefix)/Caskroom/sparkle" -name sign_update -type f | head -1)"
          echo "$SPARKLE_EDDSA_KEY" > "$RUNNER_TEMP/sparkle_key"
          SIGN_OUTPUT=$("$SIGN_UPDATE" app/DxaiBar/build/DxaiBar.zip -f "$RUNNER_TEMP/sparkle_key")
          rm -f "$RUNNER_TEMP/sparkle_key"
          ED_SIG=$(echo "$SIGN_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          echo "ed_signature=$ED_SIG" >> $GITHUB_OUTPUT
          echo "length=$LENGTH" >> $GITHUB_OUTPUT
          echo "EdDSA signature: $ED_SIG"
          echo "Length: $LENGTH"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload DxaiBar.zip artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dxaibar-app
          path: app/DxaiBar/build/DxaiBar.zip
          retention-days: 1

  release:
    name: Publish Release
    needs: [build, build-app]
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: bin
          pattern: binaries-*
          merge-multiple: true

      - name: Download DxaiBar.app artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: app
          name: dxaibar-app

      - name: Display structure of downloaded files
        run: |
          ls -R bin/
          ls -R app/

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bin/*
            app/DxaiBar.zip
          generate_release_notes: true
          draft: false
          prerelease: false

  update-appcast:
    name: Update Sparkle Appcast
    needs: [build-app, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4
        with:
          ref: gh-pages

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#V}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate appcast.xml
        env:
          ED_SIGNATURE: ${{ needs.build-app.outputs.ed_signature }}
          ZIP_LENGTH: ${{ needs.build-app.outputs.zip_length }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          DOWNLOAD_URL="https://github.com/glen15/dxai/releases/download/${TAG}/DxaiBar.zip"
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S %z')
          cat > appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>DxaiBar Updates</title>
              <link>https://glen15.github.io/dxai/appcast.xml</link>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${ED_SIGNATURE}"
                  length="${ZIP_LENGTH}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF
          echo "Generated appcast.xml for version ${VERSION}"
          cat appcast.xml

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: appcast.xml 업데이트 v${VERSION}" || echo "No changes to commit"
          git push

  update-formula:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Extract version from tag
        id: tag_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#V}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION (tag: $TAG)"

      - name: Update Homebrew formula (Personal Tap)
        uses: mislav/bump-homebrew-formula-action@56a283fa15557e9abaa4bdb63b8212abc68e655c # v3.6
        with:
          formula-name: dxai
          formula-path: Formula/dxai.rb
          homebrew-tap: glen15/homebrew-dxai
          tag-name: ${{ steps.tag_version.outputs.tag }}
          commit-message: |
            dxai ${{ steps.tag_version.outputs.version }}

            Automated release via GitHub Actions
        env:
          COMMITTER_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Update Homebrew formula (Official Core)
        uses: mislav/bump-homebrew-formula-action@56a283fa15557e9abaa4bdb63b8212abc68e655c # v3.6
        with:
          formula-name: dxai
          homebrew-tap: Homebrew/homebrew-core
          tag-name: ${{ steps.tag_version.outputs.tag }}
          commit-message: |
            dxai ${{ steps.tag_version.outputs.version }}

            Automated release via GitHub Actions
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        continue-on-error: true

      - name: Verify formula updates
        if: success()
        run: |
          echo "✓ Homebrew formulae updated successfully"
          echo "  Version: ${{ steps.tag_version.outputs.version }}"
          echo "  Tag: ${{ steps.tag_version.outputs.tag }}"
          echo "  Personal tap: glen15/homebrew-dxai"
          echo "  Official core: Homebrew/homebrew-core (PR created)"
